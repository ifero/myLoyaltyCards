    <rect x="238" y="298" width="548" height="404" rx="98" fill="none" stroke="#FFD8C3" stroke-width="10"/>
  </g>

  <rect x="292" y="238" width="440" height="112" rx="48" fill="#FFDCC8"/>
  <rect x="318" y="416" width="398" height="30" rx="15" fill="#F8B992" fill-opacity="0.72"/>
  <rect x="318" y="470" width="312" height="30" rx="15" fill="#F8B992" fill-opacity="0.56"/>

  <circle cx="690" cy="566" r="35" fill="#FFCF5D"/>
