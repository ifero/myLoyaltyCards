    <filter id="shadow" x="182" y="184" width="664" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="18" flood-color="#5B1F4A" flood-opacity="0.28"/>
