<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="myLoyaltyCards icon variant sunset">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="910" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A18"/>
      <stop offset="0.55" stop-color="#EF4D6D"/>
      <stop offset="1" stop-color="#7A3E9D"/>
    </linearGradient>
    <linearGradient id="wallet" x1="240" y1="300" x2="790" y2="770" gradientUnits="userSpaceOnUse">
