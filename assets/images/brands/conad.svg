<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Conad: white logo with stylized sunflower/daisy -->
  <!-- Sunflower petals radiating from center -->
  <g transform="translate(100, 70)">
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(0)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(30)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(60)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(90)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(120)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(150)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(180)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(210)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(240)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(270)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(300)"/>
    <ellipse cx="0" cy="-22" rx="6" ry="14" fill="#FFFFFF" transform="rotate(330)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
  </g>
  <!-- CONAD text -->
  <text x="100" y="135" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">CONAD</text>
</svg>