<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Carrefour: iconic two arrows forming C in negative space -->
  <g transform="translate(100, 80)">
    <!-- Left arrow (blue, pointing left) -->
    <path d="M-5 0 L-40 -30 L-40 -12 L-55 -12 L-55 12 L-40 12 L-40 30 Z" fill="#004E9A"/>
    <!-- Right arrow (red, pointing right) -->
    <path d="M5 0 L40 -30 L40 -12 L55 -12 L55 12 L40 12 L40 30 Z" fill="#E3001B"/>
  </g>
  <!-- "carrefour" text -->
  <text x="100" y="145" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">carrefour</text>
</svg>