<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- H&M: iconic Didot-like serif with thin serifs and thick strokes -->
  <!-- H character path (thick strokes, thin serifs) -->
  <g transform="translate(30, 50)">
    <!-- H vertical strokes -->
    <rect x="14" y="2" width="12" height="96" fill="#FFFFFF"/>
    <rect x="49" y="2" width="12" height="96" fill="#FFFFFF"/>
    <!-- H crossbar -->
    <rect x="14" y="44" width="47" height="10" fill="#FFFFFF"/>
    <!-- H serifs top -->
    <rect x="8" y="0" width="24" height="3" fill="#FFFFFF"/>
    <rect x="43" y="0" width="24" height="3" fill="#FFFFFF"/>
    <!-- H serifs bottom -->
    <rect x="8" y="97" width="24" height="3" fill="#FFFFFF"/>
    <rect x="43" y="97" width="24" height="3" fill="#FFFFFF"/>
  </g>
  <!-- & symbol -->
  <text x="103" y="136" font-family="'Didot', 'Bodoni MT', Georgia, serif" font-size="44" font-weight="400" fill="#FFFFFF" text-anchor="middle">&amp;</text>
  <!-- M character path -->
  <g transform="translate(115, 50)">
    <!-- M vertical strokes -->
    <rect x="4" y="2" width="12" height="96" fill="#FFFFFF"/>
    <rect x="54" y="2" width="12" height="96" fill="#FFFFFF"/>
    <!-- M diagonals -->
    <polygon points="10,2 35,60 38,52 16,2" fill="#FFFFFF"/>
    <polygon points="60,2 35,60 32,52 54,2" fill="#FFFFFF"/>
    <!-- M serifs top -->
    <rect x="-2" y="0" width="24" height="3" fill="#FFFFFF"/>
    <rect x="48" y="0" width="24" height="3" fill="#FFFFFF"/>
    <!-- M serifs bottom -->
    <rect x="-2" y="97" width="24" height="3" fill="#FFFFFF"/>
    <rect x="48" y="97" width="24" height="3" fill="#FFFFFF"/>
  </g>
</svg>