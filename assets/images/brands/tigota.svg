<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Tigota: distinctive text with paw print -->
  <!-- Paw print above text -->
  <g transform="translate(100, 58)">
    <!-- Main pad -->
    <ellipse cx="0" cy="8" rx="12" ry="10" fill="#FFFFFF"/>
    <!-- Toe pads -->
    <circle cx="-14" cy="-6" r="6" fill="#FFFFFF"/>
    <circle cx="-5" cy="-14" r="6" fill="#FFFFFF"/>
    <circle cx="5" cy="-14" r="6" fill="#FFFFFF"/>
    <circle cx="14" cy="-6" r="6" fill="#FFFFFF"/>
  </g>
  <!-- Tigota text -->
  <text x="100" y="120" font-family="'Arial Rounded MT Bold', Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Tigot&#224;</text>
</svg>