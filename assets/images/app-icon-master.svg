<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="myLoyaltyCards app icon">
  <defs>
    <linearGradient id="bgGradient" x1="128" y1="64" x2="896" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A73E8"/>
      <stop offset="1" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="walletGradient" x1="250" y1="300" x2="780" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#E9F1FF" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="walletShadow" x="188" y="185" width="648" height="604" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#041C4B" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bgGradient)"/>

  <circle cx="220" cy="224" r="120" fill="#8EC1FF" fill-opacity="0.18"/>
  <circle cx="854" cy="808" r="150" fill="#7FB4FF" fill-opacity="0.16"/>

  <g filter="url(#walletShadow)">
    <rect x="246" y="300" width="532" height="392" rx="94" fill="url(#walletGradient)"/>
    <rect x="246" y="300" width="532" height="392" rx="94" fill="none" stroke="#C9DCFF" stroke-width="10"/>
  </g>

  <rect x="298" y="242" width="428" height="108" rx="44" fill="#D9E9FF"/>
  <rect x="320" y="420" width="388" height="28" rx="14" fill="#B4CBF7" fill-opacity="0.65"/>
  <rect x="320" y="470" width="304" height="28" rx="14" fill="#B4CBF7" fill-opacity="0.52"/>

  <circle cx="686" cy="562" r="34" fill="#FFD54F"/>
  <circle cx="753" cy="328" r="18" fill="#E2231A" fill-opacity="0.8"/>
</svg>
