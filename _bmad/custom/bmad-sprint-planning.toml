# Team override for the bmad-sprint-planning skill.
# Merges over .claude/skills/bmad-sprint-planning/customize.toml per BMad structural
# rules (scalars: override wins; arrays such as persistent_facts: append).
#
# WHY THIS EXISTS
# ---------------
# This project's docs/sprint-artifacts/sprint-status.yaml is a documented SUPERSET of the
# vanilla BMAD schema (see docs/sprint-artifacts/README.md). Vanilla sprint-planning only
# knows the `development_status` + `action_items` shape and would STRIP the sprint blocks
# (last_sprint / current_sprint / next_sprint / waves) on regeneration. The on_complete
# guard below makes any regeneration non-destructive and keeps the tracker authoritative.

[workflow]

persistent_facts = [
  "file:{project-root}/docs/sprint-artifacts/README.md",
]

on_complete = """
sprint-status.yaml here is a SUPERSET of the vanilla BMAD schema and is the SOURCE OF TRUTH.
Before writing the file you MUST preserve, verbatim, the top-level `last_sprint`,
`current_sprint`, and `next_sprint` blocks (including every number/name/goal/status/waves/
notes/retrospective field) and the `action_items` list. Only (re)generate the
`development_status` map, and do it as a MERGE into the existing file: never downgrade a
status; keep the documented project-extension statuses (`cancelled`, `absorbed`,
`absorbed-into-epic-N`); keep epic completion dates as inline comments on the epic line
(never as separate `epic-N-completed` keys); keep the metadata keys `last_updated` and
`project_key`. Story files live in `docs/sprint-artifacts/stories/` (a subfolder) — detect
them there, not flat. If following the vanilla steps would drop or rewrite any of the blocks
above, STOP and report to the user instead of writing.
"""
