<!DOCTYPE html>
<html lang="en">
  <body style="margin: 0; padding: 0; background: #f3f4f6; color: #111827; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #f3f4f6; min-width: 100%;">
      <tr>
        <td align="center" style="padding: 24px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);">
            <tr>
              <td style="padding: 32px 32px 24px; text-align: center;">
                <p style="margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #6366f1;">myLoyaltyCards</p>
                <h1 style="margin: 16px 0 0; font-size: 28px; line-height: 1.2; font-weight: 700; color: #111827;">
                  Confirm your email address
                </h1>
                <p style="margin: 16px 0 0; font-size: 16px; line-height: 1.75; color: #4b5563;">
                  Enter the code below in the app to finish creating your account.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 0 32px 32px;">
                <div style="display: inline-flex; align-items: center; justify-content: center; width: 100%; max-width: 360px; padding: 22px 16px; background: #111827; color: #ffffff; font-size: 36px; font-weight: 700; letter-spacing: 0.18em; font-variant-numeric: tabular-nums; border-radius: 20px; box-sizing: border-box;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 32px 32px; color: #4b5563; font-size: 15px; line-height: 1.75;">
                <p style="margin: 0;">This code expires in 60 minutes. If you didn't request this email, you can safely ignore it.</p>
                <p style="margin: 24px 0 0; font-size: 13px; color: #9ca3af;">Need help? Reply to this email and our support team will assist you.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
