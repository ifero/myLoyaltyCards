current_sprint:
  number: 10
  name: 'Sprint 10: App-Wide Design Overhaul'
  goal: 'Deliver complete Figma designs for all app screens (Epic 12) — design-only sprint, no implementation'
  status: in-progress
  start_date: 2026-03-28
  end_date: 2026-04-11
  duration: 2 weeks
  epics: [12]
  stories:
    - 12-1-design-system-foundation
    - 12-2-home-screen-card-list
    - 12-3-card-detail
    - 12-4-add-card-flow
    - 12-5-auth-screens
    - 12-6-settings-screen
    - 12-7-onboarding
    - 12-8-sync-status-indicators
    - 12-9-apple-watch
  # Wave order (dependency chain — Sally + creative team):
  #   Wave 1:            12-1 (Design System Foundation — everything depends on this)
  #   Wave 2 (parallel): 12-2 + 12-3 + 12-4 (core card experience)
  #   Wave 3 (parallel): 12-5 + 12-6 + 12-7 (supporting screens)
  #   Wave 4 (parallel): 12-8 + 12-9 (peripheral)
  notes: |
    Pure design sprint — all deliverables are Figma pages.
    Figma file: https://www.figma.com/design/4PSsX8SyTUU0GCUdBAAEED/Test
    Reference apps: SuperCards, Klarna wallet.
    Key design decisions:
      - Light mode primary, dark mode fully supported
      - Brand colors from catalogue used as card backgrounds (data already exists in italy.json)
      - Real brand logos (SVGs already in assets/images/brands/) replace letter avatars
      - Proper CTA hierarchy: primary (filled), secondary (outlined), destructive (red)
    Epic 8 (Settings) absorbed into future Epic 13 (UI Implementation).
    Epic 13 stories will be created after Epic 12 designs are approved by ifero.
    Epic 13 maps 1:1 to Epic 12: each approved design → matching implementation story.

  decisions:
    - id: DEC-S10-001
      date: 2026-03-28
      title: 'Create Epic 13 (UI Implementation) as separate epic from Epic 12 (Design)'
      context: |
        The full app UI/UX overhaul requires two distinct phases:
        1. Design phase (Figma deliverables) — creative team
        2. Implementation phase (code changes) — dev team
        Mixing design and implementation in one epic would blur accountability and sprint tracking.
      decision: |
        Epic 12 = Design deliverables in Figma (Sprint 10, design-only).
        Epic 13 = Code implementation of approved designs (Sprint 11+).
        Epic 13 stories are PLACEHOLDERS — full detail written only after ifero approves Epic 12 Figma designs.
        Review gate between epics: designs must be approved before any implementation begins.
      consequences: |
        - Epic 8 (Settings & Preferences) is absorbed into Epic 13 (story 13-6 covers settings implementation).
        - Epic 8 stories (8-1 through 8-5) will NOT be implemented separately.
        - Epic 13 story specs will reference specific Figma frames for pixel-accurate implementation.
        - Sprint 11 planning is blocked until Epic 12 review is complete.
      status: approved

