# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Epic Status Transitions:
#   - backlog → in-progress: Automatically when first story is created (via create-story)
#   - in-progress → done: Manually when all stories reach 'done' status
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - drafted: Story file created (legacy; BMAD readers map → ready-for-dev)
#   - ready-for-dev: Draft approved and story context created
#   - in-progress: Developer actively working on implementation
#   - review: Ready for code review (via Dev's code-review workflow)
#   - done: Story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been done
#
# PROJECT EXTENSIONS (non-vanilla — documented + tolerated by BMAD readers):
#   Full superset schema: docs/sprint-artifacts/README.md
#   - Terminal statuses beyond the vanilla set (kept truthful rather than faked as 'done'):
#       cancelled — work consciously dropped (e.g. 11-3, 11-4)
#       absorbed / absorbed-into-epic-N — scope delivered under another epic (Epic 8 → Epic 13)
#   - Sprint blocks (last_sprint / current_sprint / next_sprint, each with waves) use their own
#     status vocabulary: proposed → planned → in-progress → completed. Vanilla BMAD neither emits
#     nor parses these; they are preserved deliberately as the live sprint record.
#   - action_items entries carry a `category` field and may use a `parked` status.
#   - Epic completion dates are inline comments on the epic line (never separate `epic-N-completed` keys).
#
# WORKFLOW NOTES:
# ===============
# - Epic transitions to 'in-progress' automatically when first story is created
# - Stories can be worked in parallel if team capacity allows
# - Developer typically drafts next story after previous one is 'done' to incorporate learnings
# - Dev moves story to 'review', then runs code-review (fresh context, different LLM recommended)

