  notes_sprint14_planning: |
    Sprint 14 planned in party mode on 2026-05-03.
    Primary Sprint 14 goals are Apple Watch reliability, Italian localization, and household collaboration discovery.
    Core dependencies include watch complication validation, incremental catalogue generation, image-based scanning, and Italian copy approval.
  decisions:
    - id: DEC-S12-001
      date: 2026-04-11
      title: 'Prioritize TestFlight delivery for real-device testing'
      context: |
        Epic 13 delivered full UI implementation. ifero needs to test the complete app
        on real devices (iPhone + Apple Watch) to validate before any further feature work.
        iOS TestFlight pipeline already exists (Fastlane ios beta + beta-releases.yml).
        watchOS companion has CI tests but no build/upload pipeline.
      decision: |
        Sprint 12 focuses on CI/CD completion + adding watchOS TestFlight pipeline.
        One new story (11-6) added to Epic 11 for Fastlane watchOS → TestFlight.
        iOS can ship immediately by tagging an RC (v*.*.*-rc.*).
      consequences: |
        - Feature work (Epic 9, 10) deferred until real-device testing completes
        - watchOS needs Fastlane lane + GHA workflow (signing, scheme, upload)
        - May surface real-device bugs that weren't caught in simulator
      status: approved
    - id: DEC-S10-001
      date: 2026-03-28
      title: 'Create Epic 13 (UI Implementation) as separate epic from Epic 12 (Design)'
      context: |
        The full app UI/UX overhaul requires two distinct phases:
        1. Design phase (Figma deliverables) — creative team
        2. Implementation phase (code changes) — dev team
        Mixing design and implementation in one epic would blur accountability and sprint tracking.
      decision: |
        Epic 12 = Design deliverables in Figma (Sprint 10, design-only).
        Epic 13 = Code implementation of approved designs (Sprint 11+).
        Epic 13 stories are PLACEHOLDERS — full detail written only after ifero approves Epic 12 Figma designs.
        Review gate between epics: designs must be approved before any implementation begins.
      consequences: |
        - Epic 8 (Settings & Preferences) is absorbed into Epic 13 (story 13-6 covers settings implementation).
        - Epic 8 stories (8-1 through 8-5) will NOT be implemented separately.
        - Epic 13 story specs will reference specific Figma frames for pixel-accurate implementation.
        - Sprint 11 planning is blocked until Epic 12 review is complete.
      status: approved
    - id: DEC-S11-001
      date: 2026-04-01
      title: 'Include icon cleanup blockers as Sprint 11 Wave 1 items'
      context: |
        Epic 12 retro identified that stories 12-1 through 12-4 and the Figma design system page
        still reference FontAwesome instead of MI/MCI. Story 13-1 implements from these specs.
      decision: |
        Add two blocker tickets (12-icon-doc-cleanup, 12-figma-icon-update) as Sprint 11 items
        in Wave 1, blocking 13-1. Keeps all work visible in one sprint backlog.
      consequences: |
        - Wave 1 is sequential: cleanup → cleanup → 13-1
        - No "pre-sprint" invisible work
        - Sprint velocity reflects all actual effort
      status: approved
    - id: DEC-S11-002
      date: 2026-04-01
      title: 'Story 13-7a depends on 13-6 (not parallel in Wave 3)'
      context: |
        Import Data from JSON (13-7a) needs the settings screen scaffold from 13-6.
        Running them in parallel would create integration conflicts.
      decision: |
        13-7a moves to Wave 3b, starting only after 13-6 completes.
        Wave 3 runs 13-5, 13-6, 13-7 in parallel. 13-7a follows.
      consequences: |
        - Slight serialization in Wave 3 area
        - Cleaner integration, no rework
      status: approved

