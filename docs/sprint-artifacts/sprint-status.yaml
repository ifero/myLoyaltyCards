  number: 17
  name: 'Sprint 17: Reliability & Auth Hardening'
  goal: 'Fix the remaining stakeholder-reported defects and harden the platform: stop deleted cards resurrecting on cloud sync (16-11); rebuild password management on OTP — reset-via-OTP (6-19) and change-password-in-Settings (6-20); bound the OTA update download at boot (16-12); and close the coverage blind spot by widening the jest gate to shared/** (16-13).'
  status: completed
  planning_date: 2026-07-11
  start_date: 2026-07-11
  end_date: 2026-07-20
  completed_date: 2026-07-20
  epics: [16, 6]
  stories:
    - 16-11-fix-card-deletion-cloud-resurrection
    - 6-19-password-reset-via-otp
    - 6-20-change-password-in-settings
    - 16-13-widen-jest-coverage-to-shared
    - 16-12-bound-ota-update-download-boot
    - 16-15-fix-relative-time-hermes-intl-crash
  waves:
    wave_1:
      stories: [16-11, 16-12, 16-13]
      note: "Reliability + tech-debt, parallel-capable. 16-11: data-integrity sync fix (deleted cards resurrect) — cousin of 16-8; MUST coordinate with 16-8's useCloudSync module-level singleton store, and revive the dead mergeWithDeletions (cloud-sync.ts). 16-12: bound Updates.fetchUpdateAsync/reloadAsync at boot with withTimeout (reuses core/utils/with-timeout from 16-10; online mid-download edge). 16-13: widen jest collectCoverageFrom to shared/** — land the config early so this sprint's shared/ changes (16-11) are gated; the triage (backfill vs justified exclude) is the work."
    hotfix:
      stories: [16-15]
      note: "Mid-sprint add (2026-07-16): production Hermes crash fix. Sentry REACT-NATIVE-1 (7 events, handled onunhandledrejection) + REACT-NATIVE-2 (2 events, fatal onerror) share one root cause — formatRelativeTime built `new Intl.RelativeTimeFormat` unconditionally, but Hermes doesn't implement it → `new undefined(...)` → TypeError reading .prototype. Node/Jest has full ICU so CI was green; the Italian path (sole formatter consumer) had zero coverage. Fix: drop Intl entirely, hardcode Italian relative strings (ICU-verified byte-for-byte) + Italian-locale tests. Fixes both Sentry issues. Fast-tracked; fixed before the story was written."
    wave_2:
      stories: [6-19, 6-20]
      note: "Auth/OTP thread, sequenced 6-19 → 6-20. 6-19 builds the recovery-OTP plumbing (send/verify wrappers + OTP UX), reusing Epic 6's proven verifyEmailOtp/VerifyEmailScreen; de-risked by 16-10's Supabase-auth learnings (hasPersistedSession; INITIAL_SESSION not synchronous for an expired token). 6-20 reuses that plumbing for the Settings change-password entry."
  notes: |
    Sprint 17 delivered 6/6 stories, all done and merged to main by 2026-07-20. Tests ~1675 →
    1747 (≈+72), 80% global gate held (branch ~85%), 0 new production incidents. Two of the six
    fixed real stakeholder/production defects: 16-15 (fatal iOS-Hermes Intl crash — Sentry
    RN-1/RN-2) and 16-11 (deleted-card cloud resurrection). Heavy reuse of prior investment:
    withTimeout (16-10) carried 16-12 with no new code; the 6.18 OTP plumbing carried 6-19 → 6-20
    (nearly free via a single origin route param); 16-11 revived mergeWithDeletions, dead since
    Story 7.6. Tech-debt spawned: 16-14 (OTA observability — logger.warn is __DEV__-only → prod
    -blind). Device/RC validation CLEARED by ifero (watch usage/favourite + all stacked device
    gates) → unblocked Sprint 18. Neither epic closed: Epic 16 is a standing bucket (16-6/16-14
    /16-16 outstanding); Epic 6 still has 6-12/6-13 social sign-in in backlog.
  retrospective: |
    Sprint 17 retrospective completed 2026-07-20 (party mode; Amelia facilitating).
    Full write-up: docs/sprint-artifacts/sprint-17-retro-2026-07-20.md
    Headline: bug-clearing focus; reuse compounding paid off exactly as the Sprint 16 retro
    predicted; root-cause fixes throughout (16-11 revived dead code, 16-15 dropped Intl entirely,
    16-13 widened the gate at the config root). Standout lesson: green tests on Node do NOT prove
    a Hermes build works — Intl behaves three ways (full on Node/Jest, OS-ICU on Android Hermes,
    limited subset on iOS Hermes); only exercising the real prod runtime closes that class.
    Decision: adopt the FormatJS Intl polyfill as the standard for Intl usage (action D → story
    16-16, drafted). Process lesson: keep the tracker honest at close in BOTH directions — three
    records under-reported completion this sprint (status, action_items, device-validation debt).

