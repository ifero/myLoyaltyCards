# Store Upload (Final Release)
# Uploads builds to App Store Connect and Play Console on final release tags.
# Uses negative lookahead pattern to exclude RC tags (v1.2.3-rc.1).
name: Store Upload (Final Release)

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*' # Exclude pre-release tags (e.g. v1.2.3-rc.1)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  upload-ios-release:
    name: Upload iOS Release Build
    runs-on: macos-latest
    env:
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_USERNAME: ${{ secrets.MATCH_USERNAME }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_DISABLE_COLORS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode (latest stable for iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}" >> .env
      - name: Prebuild native projects
        run: npx expo prebuild --platform ios
      - name: Generate watchOS catalogue (Brands.swift)
        run: xcrun --sdk macosx swift watch-ios/Scripts/generate-catalogue.swift
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
      - name: Upload iOS Release Build
        run: bundle exec fastlane ios upload_release

  upload-android-release:
    name: Upload Android Release Build
    runs-on: ubuntu-latest
    env:
      ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
      PLAY_STORE_API_KEY: ${{ secrets.PLAY_STORE_API_KEY }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_DISABLE_COLORS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}" >> .env
      - name: Compute Android versionCode
        # Authoritative versionCode baked into the AAB manifest by app.config.ts
        # during prebuild. Production band = run number + 1,000,000 so this
        # workflow's counter can never collide with the alpha/beta workflow's in
        # Play's shared versionCode space. The +1,000,000 offset must stay in
        # sync with PRODUCTION_VERSION_CODE_OFFSET in app.config.ts.
        run: echo "ANDROID_VERSION_CODE=$((GITHUB_RUN_NUMBER + 1000000))" >> "$GITHUB_ENV"
      - name: Prebuild native projects
        run: npx expo prebuild --platform android
      - name: Decode Android release keystore
        run: |
          mkdir -p "$(dirname "$ANDROID_KEYSTORE_PATH")"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
      - name: Tune Gradle memory for CI
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m
          org.gradle.workers.max=2
          org.gradle.daemon=false
          EOF
      - name: Upload Android Release Build
        run: bundle exec fastlane android upload_release
