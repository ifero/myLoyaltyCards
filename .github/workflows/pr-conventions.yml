name: PR conventions

# Fails the PR if it doesn't follow the machine-checkable rules in CONTRIBUTING.md:
# Conventional Commit title, branch naming, and a spec-first story reference for
# code changes (docs:/chore: titles, catalogue PRs, and design-labelled PRs are exempt).

on:
  pull_request:
    # labeled/unlabeled: re-run when a story-exempt label (catalogue/design) is applied after opening.
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check:
    # Skip drafts, bot PRs (e.g. Dependabot), and already-closed/merged PRs
    # (labeled/unlabeled fire post-merge too — don't re-run on resolved PRs).
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot' && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate PR against CONTRIBUTING rules
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/check-pr-conventions.mjs
