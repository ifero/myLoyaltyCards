name: CI — watchOS tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'targets/watch/**'
      - 'ios/**'
      - 'app.json'
      - 'fastlane/Fastfile'
  push:
    branches: [main]
    paths:
      - 'targets/watch/**'
      - 'ios/**'
      - 'app.json'
      - 'fastlane/Fastfile'

jobs:
  watchos-tests:
    name: watchOS (xcodebuild) tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run watchOS catalogue generation tests (Jest)
        run: npx jest --testPathPattern='targets/watch/__tests__' --testPathIgnorePatterns='/node_modules/' --no-coverage
        env:
          CI: true

      - name: Generate iOS project with watch target
        run: npx expo prebuild --clean --platform ios

      - name: Build watchOS target (xcodebuild)
        run: yarn watch:build:ci
        env:
          CI: true
