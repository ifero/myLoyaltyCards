# iOS Release Build
# Triggers only on main branch and only if app/core/features/shared/ios change
name: iOS Release Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'core/**'
      - 'features/**'
      - 'shared/**'
      - 'ios/**'

jobs:
  ios-release:
    name: iOS Release Build
    runs-on: macos-15
    env:
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_USERNAME: ${{ secrets.MATCH_USERNAME }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_DISABLE_COLORS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Prebuild native projects
        run: npx expo prebuild --platform ios
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Run Fastlane (iOS AdHoc)
        run: bundle exec fastlane adhoc
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: myLoyaltyCards-adhoc-${{ github.run_id }}
          path: output/*.ipa
          if-no-files-found: error
