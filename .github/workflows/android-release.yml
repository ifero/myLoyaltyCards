# Android AdHoc Build
# Triggers on main branch push (if app/core/features/shared/android change)
# Also available as manual workflow_dispatch on any branch
name: Android AdHoc Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'core/**'
      - 'features/**'
      - 'shared/**'
      - 'android/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android-adhoc:
    name: Android AdHoc Build
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
      # Sentry: DSN is inlined into the JS bundle at build time (runtime reporting);
      # auth token lets the build upload source maps + ProGuard mappings for symbolication.
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_DISABLE_COLORS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
      - name: Install dependencies
        # `yarn install` runs the `supabase` CLI postinstall, which downloads a
        # binary from GitHub Releases and pipes it into gunzip without checking the
        # HTTP status. A transient GitHub hiccup therefore aborts the whole install
        # with `Z_DATA_ERROR: incorrect header check`. This CLI version has no
        # skip-download flag, so retry to ride out the flakiness.
        run: |
          for attempt in 1 2 3; do
            if yarn install --frozen-lockfile; then
              echo "Dependencies installed (attempt $attempt)."
              exit 0
            fi
            echo "::warning::yarn install failed (attempt $attempt/3); retrying in 15s…"
            sleep 15
          done
          echo "::error::yarn install failed after 3 attempts."
          exit 1
      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}" >> .env
          echo "EXPO_PUBLIC_SENTRY_DSN=${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}" >> .env
      - name: Configure Sentry symbol upload
        # sentry.gradle uploads source maps + ProGuard mappings via sentry-cli,
        # which needs SENTRY_AUTH_TOKEN. Skip cleanly when the token is absent
        # (SENTRY_DISABLE_AUTO_UPLOAD is honoured by sentry.gradle) so the build
        # never fails for a missing token; enable upload when it is present.
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN present — Sentry symbol/source-map upload enabled."
            echo "SENTRY_DISABLE_AUTO_UPLOAD=false" >> "$GITHUB_ENV"
          else
            echo "::warning::SENTRY_AUTH_TOKEN not set — skipping Sentry symbol upload (crashes won't be symbolicated). Add the SENTRY_AUTH_TOKEN repo secret to enable."
            echo "SENTRY_DISABLE_AUTO_UPLOAD=true" >> "$GITHUB_ENV"
          fi
      - name: Prebuild native projects
        run: npx expo prebuild --platform android
      - name: Decode Android release keystore
        run: |
          mkdir -p "$(dirname "$ANDROID_KEYSTORE_PATH")"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
      - name: Tune Gradle memory for CI
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m
          org.gradle.workers.max=2
          org.gradle.daemon=false
          EOF
      - name: Pre-provision Gradle (harden flaky distribution download)
        # `expo prebuild` writes gradle-wrapper.properties with the wrapper's
        # default 10s networkTimeout. The wrapper's download of gradle-*-bin.zip
        # from services.gradle.org intermittently exceeds that and aborts the build
        # with `java.net.SocketTimeoutException: Read timed out`. Raise the timeout,
        # then warm the download with retries so Fastlane's assembleRelease runs
        # against an already-provisioned Gradle instead of downloading under a lane.
        run: |
          props=android/gradle/wrapper/gradle-wrapper.properties
          if grep -q '^networkTimeout=' "$props"; then
            sed -i 's/^networkTimeout=.*/networkTimeout=120000/' "$props"
          else
            printf 'networkTimeout=120000\n' >> "$props"
          fi
          echo "Gradle wrapper config:"; cat "$props"
          for attempt in 1 2 3; do
            if (cd android && ./gradlew --version); then
              echo "Gradle distribution provisioned (attempt $attempt)."
              exit 0
            fi
            echo "::warning::Gradle provisioning failed (attempt $attempt/3); retrying in 20s…"
            sleep 20
          done
          echo "::error::Gradle provisioning failed after 3 attempts."
          exit 1
      - name: Run Fastlane (Android AdHoc)
        run: bundle exec fastlane android adhoc
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myLoyaltyCards-android-adhoc-${{ github.run_id }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
