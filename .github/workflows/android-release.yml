# Android AdHoc Build
# Triggers on main branch push (if app/core/features/shared/android change)
# Also available as manual workflow_dispatch on any branch
name: Android AdHoc Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'core/**'
      - 'features/**'
      - 'shared/**'
      - 'android/**'
  workflow_dispatch:

jobs:
  android-adhoc:
    name: Android AdHoc Build
    runs-on: ubuntu-latest
    env:
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_DISABLE_COLORS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Prebuild native projects
        run: npx expo prebuild --platform android
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Run Fastlane (Android AdHoc)
        run: bundle exec fastlane android adhoc
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myLoyaltyCards-android-adhoc-${{ github.run_id }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
